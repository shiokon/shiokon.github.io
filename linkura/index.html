<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Link Like Cards</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#127183;</text></svg>">
<style>
* { box-sizing: border-box; }
html { color-scheme: dark light; }
:root {
  --page: #121212;
  --card: #1a1a1e;
  --card2: #232329;
  --ink: #f2f2f4;
  --ink2: #c6c5cc;
  --muted: #8f8e96;
  --hair: #2a2a30;
  --border: rgba(255,255,255,.08);
  --accent: #ff69fc;
  --glass: rgba(18,18,18,.88);
}
body.light-mode {
  --page: #f4f4f6;
  --card: #ffffff;
  --card2: #ececf0;
  --ink: #1b1b20;
  --ink2: #44444c;
  --muted: #77767e;
  --hair: #e0e0e6;
  --border: rgba(0,0,0,.10);
  --accent: #e838df;
  --glass: rgba(244,244,246,.9);
}
body {
  margin: 0; background: var(--page); color: var(--ink);
  font: 15px/1.5 system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Noto Sans JP", "Yu Gothic UI", Meiryo, sans-serif;
  transition: background-color .25s ease, color .25s ease;
}
.wrap { max-width: 1200px; margin: 0 auto; padding: 0 20px 70px; }
button { font: inherit; }

/* ---- header ---- */
header.hero { text-align: center; padding: 24px 0 18px; }
h1 { font-size: 30px; margin: 0; color: var(--accent); letter-spacing: .01em; }
.subtitle { color: var(--muted); font-size: 13.5px; margin-top: 4px; }

/* ---- filter panel ---- */
.panel {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 14px 18px 16px; margin-bottom: 14px;
}
.fgroup { display: flex; align-items: center; gap: 12px; padding: 6px 0; flex-wrap: wrap; }
.fgroup + .fgroup { border-top: 1px solid var(--hair); }
.fgroup .glabel {
  flex: 0 0 62px; font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted); font-weight: 650;
}
.fgroup .icons { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.filter-icon {
  height: 40px; width: auto; object-fit: contain; cursor: pointer; border-radius: 9px;
  border: 2px solid transparent; opacity: .5; filter: saturate(.65);
  transition: opacity .15s ease, transform .15s ease, border-color .15s ease, filter .15s ease;
  padding: 2px; background: transparent;
}
.filter-icon:hover { opacity: .9; transform: translateY(-2px); }
.filter-icon.active { opacity: 1; filter: none; border-color: var(--accent); background: var(--card2); }

/* ---- toolbar ---- */
.toolbar {
  position: sticky; top: 0; z-index: 30;
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  padding: 12px 0; margin-bottom: 16px;
  background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.search {
  flex: 1 1 240px; min-width: 180px;
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 15px; color: var(--ink); font: inherit; font-size: 14px;
}
.search:focus { outline: none; border-color: var(--accent); }
.count { color: var(--muted); font-size: 13px; white-space: nowrap; }
.reset-btn {
  display: none; border: 1px solid var(--border); background: var(--card); color: var(--ink2);
  border-radius: 10px; padding: 9px 14px; cursor: pointer; font-size: 13px;
}
.reset-btn.show { display: inline-block; }
.reset-btn:hover { border-color: var(--accent); color: var(--accent); }
.mode-btn {
  border: 1px solid var(--border); background: var(--card); border-radius: 10px;
  padding: 8px 12px; cursor: pointer; font-size: 15px; line-height: 1;
}
.mode-btn:hover { border-color: var(--accent); }

/* ---- grid ---- */
#grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
.tile {
  background: var(--card); border: 1px solid var(--border); border-radius: 13px;
  overflow: hidden; cursor: pointer; text-align: left; padding: 0; color: var(--ink);
  transition: transform .14s ease, border-color .14s ease, box-shadow .14s ease;
}
.tile:hover, .tile:focus-visible {
  transform: translateY(-3px); border-color: var(--accent);
  box-shadow: 0 10px 26px rgba(0,0,0,.4);
  outline: none;
}
.t-art { position: relative; aspect-ratio: 512 / 332; background: var(--card2); overflow: hidden; }
.t-art img.layer {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  transition: opacity .28s ease;
}
.t-art img.idol { opacity: 0; }
.tile:hover .t-art img.idol { opacity: 1; }
.rarity-badge {
  position: absolute; top: 7px; left: 7px; z-index: 2;
  font-size: 11px; font-weight: 750; letter-spacing: .04em;
  padding: 2px 8px; border-radius: 999px; color: #141416;
  background: #cfcfd6;
}
.rb-SR { background: #ffd84d; }
.rb-UR { background: #ff8ffe; }
.rb-DR { background: #6fd7f0; }
.rb-BR { background: #ffb054; }
.rb-LR { background: #c9bcff; }
.t-limited { position: absolute; top: 7px; right: 7px; z-index: 2; height: 22px; filter: drop-shadow(0 1px 3px rgba(0,0,0,.6)); }
.t-info { display: flex; align-items: center; gap: 8px; padding: 9px 12px 11px; }
.t-text { flex: 1; min-width: 0; }
.t-title { font-size: 13px; font-weight: 650; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.t-name { font-size: 11.5px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.t-type { height: 24px; flex: none; }
.empty { color: var(--muted); text-align: center; padding: 60px 0; font-size: 15px; grid-column: 1 / -1; }

/* ---- modal ---- */
#modal { position: fixed; inset: 0; z-index: 100; display: none; }
#modal.open { display: block; }
.m-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.72); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
.m-panel {
  position: relative; z-index: 1; max-width: 1060px; margin: 4vh auto; max-height: 92vh;
  overflow-y: auto; background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 22px 26px 26px;
  box-shadow: 0 24px 80px rgba(0,0,0,.6);
}
.m-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding-right: 76px; min-height: 34px; }
.m-head img.lim { height: 26px; }
.m-head img.typ { height: 26px; }
.m-head .m-title { font-size: 18px; font-weight: 700; }
.m-head .m-rarity { font-size: 12px; font-weight: 750; padding: 2px 9px; border-radius: 999px; color: #141416; background: #cfcfd6; }
.m-arts { display: flex; gap: 14px; margin: 16px 0 6px; flex-wrap: wrap; justify-content: center; }
.m-arts figure { margin: 0; flex: 1 1 320px; max-width: 500px; }
.m-arts img { width: 100%; border-radius: 12px; display: block; background: var(--card2); }
.m-arts figcaption { text-align: center; color: var(--muted); font-size: 11.5px; margin-top: 5px; letter-spacing: .08em; text-transform: uppercase; }
.m-section { margin-top: 14px; }
.m-section .s-label {
  display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 5px;
}
.m-section .s-body {
  background: var(--card2); border-radius: 10px; padding: 11px 14px;
  font-size: 13.5px; line-height: 1.65; color: var(--ink2); white-space: pre-wrap; word-wrap: break-word;
}
.m-section .s-body b { color: var(--ink); }
.m-close, .m-nav {
  position: absolute; z-index: 2; border: 1px solid var(--border); background: var(--card2);
  color: var(--ink); border-radius: 10px; cursor: pointer; font-size: 17px; line-height: 1;
  padding: 8px 12px;
}
.m-close { top: 16px; right: 16px; }
.m-close:hover, .m-nav:hover { border-color: var(--accent); color: var(--accent); }
.m-nav.prev { top: 16px; right: 106px; }
.m-nav.next { top: 16px; right: 61px; }

/* ---- mobile ---- */
@media (max-width: 640px) {
  .wrap { padding: 0 12px 50px; }
  #grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .filter-icon { height: 30px; }
  .fgroup .glabel { flex-basis: 100%; padding-top: 2px; }
  .m-panel { margin: 0; max-height: 100vh; border-radius: 0; padding: 16px 14px 22px; }
  .t-title { font-size: 12px; }
  h1 { font-size: 24px; }
}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <h1>Link Like Cards</h1>
    <div class="subtitle">skill levels shown at 1..14</div>
  </header>

  <div class="panel">
    <div class="fgroup"><span class="glabel">Member</span><div class="icons" id="filter-characters"></div></div>
    <div class="fgroup"><span class="glabel">Rarity</span><div class="icons" id="filter-rarity"></div></div>
    <div class="fgroup"><span class="glabel">Limited</span><div class="icons" id="filter-limited"></div></div>
    <div class="fgroup"><span class="glabel">Style</span><div class="icons" id="filter-type"></div></div>
  </div>

  <div class="toolbar">
    <input class="search" id="search-input" type="search" placeholder="Search name / title / effects&hellip;" autocomplete="off">
    <button class="reset-btn" id="reset-btn">Reset filters</button>
    <span class="count" id="cards-count"></span>
    <button class="mode-btn" id="mode-toggle" title="Toggle light/dark mode">&#127769;</button>
  </div>

  <div id="grid"></div>
</div>

<div id="modal" aria-modal="true" role="dialog">
  <div class="m-backdrop" id="m-backdrop"></div>
  <div class="m-panel">
    <button class="m-nav prev" id="m-prev" title="Previous (&larr;)">&#8249;</button>
    <button class="m-nav next" id="m-next" title="Next (&rarr;)">&#8250;</button>
    <button class="m-close" id="m-close" title="Close (Esc)">&#10005;</button>
    <div class="m-head" id="m-head"></div>
    <div class="m-arts" id="m-arts"></div>
    <div id="m-sections"></div>
  </div>
</div>

<script>
'use strict';

const iconPaths = {
  "Momose Ginko": "./data/icons/百生吟子.png",
  "Hinoshita Kaho": "./data/icons/日野下花帆.png",
  "Kachimachi Kosuzu": "./data/icons/徒町小鈴.png",
  "Murano Sayaka": "./data/icons/村野さやか.png",
  "Anyoji Hime": "./data/icons/安養寺姫芽.png",
  "Osawa Rurino": "./data/icons/大沢瑠璃乃.png",
  "Katsuragi Izumi": "./data/icons/桂城泉.png",
  "Ceras Yanagida Lilienfeld": "./data/icons/セラス 柳田 リリエンフェルト.png",
  "Fujishima Megumi": "./data/icons/藤島慈.png",
  "Otomune Kozue": "./data/icons/乙宗梢.png",
  "Yugiri Tsuzuri": "./data/icons/夕霧綴理.png",
  "R": "./data/icons/R.png", "SR": "./data/icons/SR.png", "UR": "./data/icons/UR.png",
  "DR": "./data/icons/DR.png", "BR": "./data/icons/BR.png", "LR": "./data/icons/LR.png",
  "Normal": "./data/icons/Normal.png", "LGP": "./data/icons/LGP.png",
  "Spring": "./data/icons/Spring.png", "Summer": "./data/icons/Summer.png",
  "Autumn": "./data/icons/Autumn.png", "Winter": "./data/icons/Winter.png",
  "Party": "./data/icons/Party.png", "Graduation": "./data/icons/Graduation.png",
  "Birthday": "./data/icons/Birthday.png", "Ongeki": "./data/icons/Ongeki.png",
  "Bandori": "./data/icons/Bandori.png", "Shuffle": "./data/icons/Shuffle.png",
  "Performer": "./data/icons/Performer.png", "Moodmaker": "./data/icons/Moodmaker.png",
  "Cheerleader": "./data/icons/Cheerleader.png", "Trickster": "./data/icons/Trickster.png",
};

/* ---- light/dark ---- */
const modeBtn = document.getElementById('mode-toggle');
if (localStorage.getItem('mode') === 'light') {
  document.body.classList.add('light-mode');
  modeBtn.textContent = '☀️';
}
modeBtn.addEventListener('click', () => {
  const isLight = document.body.classList.toggle('light-mode');
  localStorage.setItem('mode', isLight ? 'light' : 'dark');
  modeBtn.textContent = isLight ? '☀️' : '🌙';
});

/* ---- state ---- */
const state = { characters: new Set(), rarity: new Set(), limited: new Set(), type: new Set(), search: '' };
let allCards = [];   // render order (newest first)
let visible = [];    // filtered, for modal prev/next
let modalIndex = -1;

const grid = document.getElementById('grid');
const countEl = document.getElementById('cards-count');
const resetBtn = document.getElementById('reset-btn');

function normRarity(r) { return r && r.startsWith('m') ? r.slice(1) : r; }

function matches(card) {
  if (state.search) {
    const blob = (card.title + ' ' + card.name + ' ' + card.special + ' ' + card.skill + ' ' + card.passive).toLowerCase();
    if (!blob.includes(state.search)) return false;
  }
  if (state.characters.size) {
    const chars = card.name.split(',').map(c => c.trim());
    if (!chars.some(c => state.characters.has(c))) return false;
  }
  if (state.rarity.size && !state.rarity.has(normRarity(card.rarity))) return false;
  if (state.limited.size && !state.limited.has(card.limited || 'Normal')) return false;
  if (state.type.size && !state.type.has(card.type)) return false;
  return true;
}

function anyFilterActive() {
  return state.search || state.characters.size || state.rarity.size || state.limited.size || state.type.size;
}

function applyFilters() {
  visible = [];
  allCards.forEach(card => {
    const ok = matches(card);
    card._tile.style.display = ok ? '' : 'none';
    if (ok) visible.push(card);
  });
  countEl.textContent = visible.length + ' / ' + allCards.length + ' cards';
  resetBtn.classList.toggle('show', !!anyFilterActive());
  let emptyEl = document.getElementById('grid-empty');
  if (!visible.length) {
    if (!emptyEl) {
      emptyEl = document.createElement('div');
      emptyEl.id = 'grid-empty';
      emptyEl.className = 'empty';
      emptyEl.textContent = '🌸 No cards match.';
      grid.appendChild(emptyEl);
    }
  } else if (emptyEl) {
    emptyEl.remove();
  }
}

/* ---- filter icons ---- */
function createFilterIcon(src, key, groupId) {
  const img = document.createElement('img');
  img.src = src;
  img.className = 'filter-icon';
  img.title = key;
  img.tabIndex = 0;
  const toggle = () => {
    img.classList.toggle('active');
    const set = state[groupId];
    set.has(key) ? set.delete(key) : set.add(key);
    applyFilters();
  };
  img.addEventListener('click', toggle);
  img.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); } });
  return img;
}

function setupFilters() {
  const groups = {
    characters: ["Anyoji Hime", "Momose Ginko", "Kachimachi Kosuzu", "Murano Sayaka", "Hinoshita Kaho",
      "Osawa Rurino", "Ceras Yanagida Lilienfeld", "Katsuragi Izumi", "Fujishima Megumi", "Otomune Kozue", "Yugiri Tsuzuri"],
    rarity: ["R", "SR", "UR", "DR", "BR", "LR"],
    limited: ["Normal", "LGP", "Spring", "Summer", "Autumn", "Winter", "Party", "Graduation"],
    type: ["Performer", "Moodmaker", "Cheerleader", "Trickster"],
  };
  for (const [id, items] of Object.entries(groups)) {
    const container = document.getElementById('filter-' + id);
    items.forEach(item => container.appendChild(createFilterIcon(iconPaths[item], item, id)));
  }
}

resetBtn.addEventListener('click', () => {
  state.characters.clear(); state.rarity.clear(); state.limited.clear(); state.type.clear();
  state.search = '';
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.filter-icon.active').forEach(i => i.classList.remove('active'));
  applyFilters();
});

document.getElementById('search-input').addEventListener('input', e => {
  state.search = e.target.value.toLowerCase().trim();
  applyFilters();
});

/* ---- grid tiles ---- */
function buildTile(card) {
  const tile = document.createElement('button');
  tile.className = 'tile';
  tile.type = 'button';

  const art = document.createElement('div');
  art.className = 't-art';
  let img = null, idol = null;
  if (card.image) {
    img = document.createElement('img');
    img.src = card.image; img.alt = ''; img.loading = 'lazy'; img.className = 'layer';
    art.appendChild(img);
  }
  if (card.idolized) {
    idol = document.createElement('img');
    idol.src = card.idolized; idol.alt = ''; idol.loading = 'lazy'; idol.className = 'layer idol';
    idol.onerror = () => idol.remove();
    art.appendChild(idol);
  }
  if (img) {
    // some cards only have idolized art; promote it so the tile isn't blank
    img.onerror = () => { img.remove(); if (idol) idol.classList.remove('idol'); };
  }
  if (card.rarity) {
    const rb = document.createElement('span');
    rb.className = 'rarity-badge rb-' + normRarity(card.rarity);
    rb.textContent = card.rarity;
    art.appendChild(rb);
  }
  if (card.limited && iconPaths[card.limited]) {
    const lim = document.createElement('img');
    lim.src = iconPaths[card.limited]; lim.alt = card.limited; lim.className = 't-limited'; lim.title = card.limited;
    art.appendChild(lim);
  }
  tile.appendChild(art);

  const info = document.createElement('div');
  info.className = 't-info';
  const text = document.createElement('div');
  text.className = 't-text';
  const t = document.createElement('div');
  t.className = 't-title'; t.textContent = card.title;
  const n = document.createElement('div');
  n.className = 't-name'; n.textContent = card.name;
  text.appendChild(t); text.appendChild(n);
  info.appendChild(text);
  if (card.type && iconPaths[card.type]) {
    const ty = document.createElement('img');
    ty.src = iconPaths[card.type]; ty.alt = card.type; ty.className = 't-type'; ty.title = card.type;
    info.appendChild(ty);
  }
  tile.appendChild(info);

  tile.addEventListener('click', () => openModal(visible.indexOf(card)));
  return tile;
}

/* ---- modal ---- */
const modal = document.getElementById('modal');

function openModal(i) {
  if (i < 0 || i >= visible.length) return;
  modalIndex = i;
  const card = visible[i];

  const head = document.getElementById('m-head');
  head.textContent = '';
  if (card.limited && iconPaths[card.limited]) {
    const lim = document.createElement('img');
    lim.src = iconPaths[card.limited]; lim.className = 'lim'; lim.alt = card.limited; lim.title = card.limited;
    head.appendChild(lim);
  }
  const title = document.createElement('span');
  title.className = 'm-title';
  title.textContent = '[' + card.title + '] ' + card.name;
  head.appendChild(title);
  if (card.rarity) {
    const rb = document.createElement('span');
    rb.className = 'm-rarity rarity-badge rb-' + normRarity(card.rarity);
    rb.style.position = 'static';
    rb.textContent = card.rarity;
    head.appendChild(rb);
  }
  if (card.type && iconPaths[card.type]) {
    const ty = document.createElement('img');
    ty.src = iconPaths[card.type]; ty.className = 'typ'; ty.alt = card.type; ty.title = card.type;
    head.appendChild(ty);
  }

  const arts = document.getElementById('m-arts');
  arts.textContent = '';
  const addArt = (src, cap) => {
    if (!src) return;
    const fig = document.createElement('figure');
    fig.style.display = 'none'; // shown only once the art actually loads
    const img = document.createElement('img');
    img.onload = () => { fig.style.display = ''; };
    img.onerror = () => fig.remove();
    img.src = src; img.alt = cap;
    const fc = document.createElement('figcaption');
    fc.textContent = cap;
    fig.appendChild(img); fig.appendChild(fc);
    arts.appendChild(fig);
  };
  addArt(card.image, 'Normal');
  addArt(card.idolized, 'Idolized');

  const secs = document.getElementById('m-sections');
  secs.textContent = '';
  [['Special', card.special], ['Skill', card.skill], ['Passive', card.passive]].forEach(([label, content]) => {
    if (!content) return;
    const s = document.createElement('div');
    s.className = 'm-section';
    const l = document.createElement('span');
    l.className = 's-label'; l.textContent = label;
    const b = document.createElement('div');
    b.className = 's-body';
    b.innerHTML = content; // own data; contains <b> markup
    s.appendChild(l); s.appendChild(b);
    secs.appendChild(s);
  });

  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
  modal.querySelector('.m-panel').scrollTop = 0;
}

function closeModal() {
  modal.classList.remove('open');
  document.body.style.overflow = '';
  modalIndex = -1;
}
document.getElementById('m-close').addEventListener('click', closeModal);
document.getElementById('m-backdrop').addEventListener('click', closeModal);
document.getElementById('m-prev').addEventListener('click', () => openModal(modalIndex - 1));
document.getElementById('m-next').addEventListener('click', () => openModal(modalIndex + 1));
addEventListener('keydown', e => {
  if (!modal.classList.contains('open')) return;
  if (e.key === 'Escape') closeModal();
  else if (e.key === 'ArrowLeft') openModal(modalIndex - 1);
  else if (e.key === 'ArrowRight') openModal(modalIndex + 1);
});

/* ---- load ---- */
fetch('./data/cards.json')
  .then(res => res.json())
  .then(cards => {
    allCards = cards.reverse().filter(c => c.special || c.skill || c.passive);
    const frag = document.createDocumentFragment();
    allCards.forEach(card => {
      card._tile = buildTile(card);
      frag.appendChild(card._tile);
    });
    grid.appendChild(frag);
    setupFilters();
    applyFilters();
  });
</script>
</body>
</html>
