<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>shio</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#127800;</text></svg>">
<style>
* { box-sizing: border-box; margin: 0; }
html { color-scheme: dark; }
body {
  min-height: 100svh;
  background: #0b0b10;
  color: #f2f2f4;
  font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Noto Sans JP", "Yu Gothic UI", Meiryo, sans-serif;
  display: grid;
  place-items: center;
  overflow-x: hidden;
  padding: 48px 20px;
}

/* --- aurora background --- */
.aurora { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }
.aurora span {
  position: absolute; border-radius: 50%; filter: blur(110px); opacity: .5;
  animation: drift 22s ease-in-out infinite alternate;
}
.aurora .a1 { width: 46vw; height: 46vw; min-width: 420px; min-height: 420px; background: #ff69fc; top: -18%; left: -8%; }
.aurora .a2 { width: 38vw; height: 38vw; min-width: 360px; min-height: 360px; background: #7d3fe0; bottom: -22%; right: -6%; animation-delay: -8s; animation-duration: 26s; }
.aurora .a3 { width: 30vw; height: 30vw; min-width: 300px; min-height: 300px; background: #2e62c9; top: 34%; left: 58%; animation-delay: -15s; animation-duration: 30s; opacity: .35; }
@keyframes drift {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(6vw, 5vh) scale(1.15); }
}

/* --- starfield (populated by JS) --- */
.stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.stars i {
  position: absolute; background: #fff; border-radius: 50%;
  animation: twinkle var(--t, 3s) ease-in-out var(--d, 0s) infinite;
  opacity: .16;
}
@keyframes twinkle {
  0%, 100% { opacity: .1; transform: scale(.8); }
  50% { opacity: .8; transform: scale(1.15); }
}

/* --- content --- */
main { position: relative; z-index: 1; text-align: center; max-width: 1060px; width: 100%; }
h1 {
  font-size: clamp(56px, 11vw, 92px);
  font-weight: 800;
  letter-spacing: .02em;
  line-height: 1.1;
  background: linear-gradient(100deg, #ff69fc 15%, #ffb3fd 38%, #ff69fc 60%, #d957d0 85%);
  background-size: 200% 100%;
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  animation: shimmer 7s linear infinite;
  filter: drop-shadow(0 0 26px rgba(255, 105, 252, .35));
}
@keyframes shimmer { to { background-position: -200% 0; } }

.cards {
  display: flex; gap: 22px; justify-content: center; flex-wrap: wrap;
  margin-top: 48px;
}
.card {
  --glow: #ff69fc;
  flex: 0 1 320px; min-width: 260px;
  border-radius: 18px;
  overflow: hidden;
  background: rgba(24, 24, 31, .62);
  border: 1px solid rgba(255, 255, 255, .09);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  text-decoration: none; color: #f2f2f4; text-align: left;
  transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
}
.card:hover, .card:focus-visible {
  transform: translateY(-6px);
  border-color: var(--glow);
  box-shadow: 0 14px 44px rgba(0, 0, 0, .55), 0 0 30px -4px var(--glow);
  outline: none;
}
.card.c2 { --glow: #9a86f5; }
.card.c3 { --glow: #5b9df0; }
.shot {
  display: block; aspect-ratio: 8 / 5; overflow: hidden;
  border-bottom: 1px solid rgba(255, 255, 255, .07);
  background: radial-gradient(120% 110% at 50% 0%, color-mix(in srgb, var(--glow) 13%, transparent), transparent 72%), #131318;
}
.shot svg { width: 100%; height: 100%; display: block; }
.label { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px 17px 15px; }
.label h2 { font-size: 16.5px; font-weight: 700; }
.label .go { color: var(--glow); font-size: 17px; font-weight: 700; transition: transform .18s ease; }
.card:hover .go { transform: translateX(4px); }

/* --- illustration: jp progress mini chart --- */
.jp-line { stroke-dasharray: 1; stroke-dashoffset: 0; }
.card:hover .jp-line { animation: drawLine .9s ease; }
@keyframes drawLine { from { stroke-dashoffset: 1; } to { stroke-dashoffset: 0; } }
.jp-dot { transform-box: fill-box; transform-origin: center; }
.card:hover .jp-dot { animation: pop .45s ease backwards; }
.card:hover .jp-dot.d2 { animation-delay: .25s; }
.card:hover .jp-dot.d3 { animation-delay: .45s; }
.card:hover .jp-dot.d4 { animation-delay: .65s; }
@keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.3); } 100% { transform: scale(1); } }

/* --- illustration: fanned cards --- */
.fan g { transform-box: fill-box; transform-origin: 50% 118%; transition: transform .25s ease; }
.fan .f1 { transform: rotate(-14deg); }
.fan .f3 { transform: rotate(14deg); }
.card:hover .fan .f1 { transform: rotate(-22deg); }
.card:hover .fan .f3 { transform: rotate(22deg); }
.card:hover .fan .f2 { transform: translateY(-7px); }

/* --- illustration: gacha capsule --- */
.capsule { transform-box: fill-box; transform-origin: center; }
.card:hover .capsule { animation: wiggle .6s ease; }
@keyframes wiggle { 0%, 100% { transform: rotate(0); } 30% { transform: rotate(-8deg); } 65% { transform: rotate(6deg); } }
.spark { transform-box: fill-box; transform-origin: center; animation: twinkle2 2.8s ease-in-out infinite; }
.spark.s2 { animation-delay: -.9s; }
.spark.s3 { animation-delay: -1.8s; }
@keyframes twinkle2 { 0%, 100% { opacity: .35; transform: scale(.8) rotate(0deg); } 50% { opacity: 1; transform: scale(1.1) rotate(18deg); } }

@media (prefers-reduced-motion: reduce) {
  .aurora span, .stars i, h1, .jp-line, .jp-dot, .capsule, .spark { animation: none !important; }
}
</style>
</head>
<body>
<div class="aurora"><span class="a1"></span><span class="a2"></span><span class="a3"></span></div>
<div class="stars" id="stars"></div>

<main>
  <h1>shio</h1>

  <nav class="cards">
    <a class="card" href="jpprogress/">
      <span class="shot">
        <svg viewBox="0 0 320 200" role="img" aria-label="Rising progress chart">
          <g stroke="rgba(255,255,255,.07)" stroke-width="1">
            <line x1="26" y1="150" x2="294" y2="150"/>
            <line x1="26" y1="105" x2="294" y2="105"/>
            <line x1="26" y1="60" x2="294" y2="60"/>
          </g>
          <path fill="#ff69fc" fill-opacity=".1"
            d="M30 166 C75 160 95 132 125 118 C155 104 180 86 210 71 C240 57 270 46 292 41 L292 172 L30 172 Z"/>
          <path class="jp-line" pathLength="1" fill="none" stroke="#ff69fc" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"
            d="M30 166 C75 160 95 132 125 118 C155 104 180 86 210 71 C240 57 270 46 292 41"/>
          <circle class="jp-dot d1" cx="125" cy="118" r="6" fill="#c98500" stroke="#131318" stroke-width="2.5"/>
          <circle class="jp-dot d2" cx="172" cy="93" r="4" fill="#2e62c9" stroke="#131318" stroke-width="2"/>
          <circle class="jp-dot d3" cx="210" cy="71" r="6" fill="#c98500" stroke="#131318" stroke-width="2.5"/>
          <circle class="jp-dot d4" cx="292" cy="41" r="6.5" fill="#c98500" stroke="#131318" stroke-width="2.5"/>
        </svg>
      </span>
      <span class="label"><h2>JP Learning Progress</h2><span class="go">&rarr;</span></span>
    </a>
    <a class="card c2" href="linkura/">
      <span class="shot">
        <svg viewBox="0 0 320 200" role="img" aria-label="Fanned hand of cards" class="fan">
          <g class="f1">
            <rect x="124" y="42" width="72" height="108" rx="10" fill="#1d1d26" stroke="#4a4460" stroke-width="1.5"/>
            <circle cx="160" cy="80" r="15" fill="#9a86f5" fill-opacity=".28"/>
            <rect x="138" y="106" width="44" height="7" rx="3.5" fill="rgba(255,255,255,.14)"/>
            <rect x="146" y="120" width="28" height="6" rx="3" fill="rgba(255,255,255,.09)"/>
          </g>
          <g class="f3">
            <rect x="124" y="42" width="72" height="108" rx="10" fill="#1d1d26" stroke="#4a4460" stroke-width="1.5"/>
            <circle cx="160" cy="80" r="15" fill="#ff69fc" fill-opacity=".22"/>
            <rect x="138" y="106" width="44" height="7" rx="3.5" fill="rgba(255,255,255,.14)"/>
            <rect x="146" y="120" width="28" height="6" rx="3" fill="rgba(255,255,255,.09)"/>
          </g>
          <g class="f2">
            <rect x="124" y="38" width="72" height="112" rx="10" fill="#232330" stroke="#9a86f5" stroke-width="2"/>
            <circle cx="160" cy="78" r="17" fill="#9a86f5" fill-opacity=".5"/>
            <path d="M160 71 l2.6 5.3 5.8 .8 -4.2 4.1 1 5.8 -5.2 -2.7 -5.2 2.7 1 -5.8 -4.2 -4.1 5.8 -.8 Z" fill="#fff" fill-opacity=".85"/>
            <rect x="136" y="106" width="48" height="7" rx="3.5" fill="rgba(255,255,255,.22)"/>
            <rect x="144" y="120" width="32" height="6" rx="3" fill="rgba(255,255,255,.13)"/>
            <rect x="130" y="134" width="18" height="8" rx="4" fill="#9a86f5" fill-opacity=".55"/>
          </g>
        </svg>
      </span>
      <span class="label"><h2>Link Like Cards</h2><span class="go">&rarr;</span></span>
    </a>
    <a class="card c3" href="llll-gacha/">
      <span class="shot">
        <svg viewBox="0 0 320 200" role="img" aria-label="Gacha capsule with cards inside">
          <defs><clipPath id="dome"><path d="M108 100 a52 52 0 0 1 104 0 Z"/></clipPath></defs>
          <g class="capsule">
            <path d="M108 100 a52 52 0 0 1 104 0 Z" fill="#5b9df0" fill-opacity=".38"/>
            <g clip-path="url(#dome)">
              <rect x="128" y="60" width="27" height="40" rx="4" fill="#ff9df8" transform="rotate(-14 141 80)"/>
              <rect x="167" y="62" width="26" height="40" rx="4" fill="#8fc1ff" transform="rotate(16 180 82)"/>
              <rect x="147" y="55" width="27" height="42" rx="4" fill="#f4f4fa" transform="rotate(3 160 76)"/>
            </g>
            <path d="M108 100 a52 52 0 0 1 104 0" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="2"/>
            <ellipse cx="134" cy="68" rx="13" ry="7" fill="#fff" fill-opacity=".5" transform="rotate(-34 134 68)"/>
            <path d="M212 100 a52 52 0 0 1 -104 0 Z" fill="#e9e9f2" fill-opacity=".95"/>
            <rect x="104" y="96" width="112" height="7" rx="3.5" fill="#131318" fill-opacity=".55"/>
          </g>
          <g transform="translate(74 56)"><path class="spark s1" fill="#ff69fc" fill-opacity=".9"
            d="M0 -13 C1.8 -3.8 3.8 -1.8 13 0 C3.8 1.8 1.8 3.8 0 13 C-1.8 3.8 -3.8 1.8 -13 0 C-3.8 -1.8 -1.8 -3.8 0 -13 Z"/></g>
          <g transform="translate(248 48)"><path class="spark s2" fill="#8fc1ff" fill-opacity=".9"
            d="M0 -10 C1.4 -2.9 2.9 -1.4 10 0 C2.9 1.4 1.4 2.9 0 10 C-1.4 2.9 -2.9 1.4 -10 0 C-2.9 -1.4 -1.4 -2.9 0 -10 Z"/></g>
          <g transform="translate(238 148)"><path class="spark s3" fill="#fff" fill-opacity=".8"
            d="M0 -7 C1 -2 2 -1 7 0 C2 1 1 2 0 7 C-1 2 -2 1 -7 0 C-2 -1 -1 -2 0 -7 Z"/></g>
        </svg>
      </span>
      <span class="label"><h2>LLLL Gacha</h2><span class="go">&rarr;</span></span>
    </a>
  </nav>
</main>

<script>
'use strict';
const host = document.getElementById('stars');
const n = Math.min(90, Math.floor(innerWidth / 14));
for (let i = 0; i < n; i++) {
  const s = document.createElement('i');
  const size = Math.random() * 2.2 + .8;
  s.style.width = s.style.height = size + 'px';
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 100 + '%';
  s.style.setProperty('--t', (Math.random() * 4 + 2.5).toFixed(2) + 's');
  s.style.setProperty('--d', (Math.random() * 5).toFixed(2) + 's');
  host.appendChild(s);
}
</script>
</body>
</html>
