<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aikatsu! Guesser</title>

    <meta property="og:title" content="Aikatsu! true fan test">
    <meta property="og:description" content="Guess which Aikatsu! episode the screenshot is from">
    <meta property="og:url" content="https://shiokon.github.io">
    <meta property="og:image" content="https://github.com/shiokon/shiokon.github.io/blob/main/akari.png?raw=true">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #f0f0f0;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #ff9800;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        #episodeImage {
            width: 70%;
            max-width: 700px;
            margin: 20px auto;
            border-radius: 20px;
            padding: 10px;
            background-image: linear-gradient(135deg, #00d9ff, #8e2de2, #00f3a1);
            background-size: 200% 200%;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-position 0.6s ease-in-out;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4), 0 0 50px rgba(0, 223, 255, 0.8);
        }

        input, button {
            padding: 12px 20px;
            font-size: 16px;
            margin-top: 10px;
            border-radius: 5px;
            border: none;
            background-color: #333;
            color: #fff;
        }

        input:focus, button:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(255, 165, 0, 0.7);
        }

        button {
            background-color: #ff9800;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #e67e22;
        }

        #resultMessage {
            font-size: 1.2rem;
            margin-top: 20px;
        }

        #resultMessage.correct {
            color: #4caf50;
        }

        #resultMessage.incorrect {
            color: #ff6347;
        }

        .counter {
            font-size: 24px;
            font-weight: bold;
            margin-top: 30px;
            color: #ff9800;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            #episodeImage {
                width: 90%;
            }

            input, button {
                width: 100%;
            }
        }
    </style>
</head>

            <input type="text" id="episodeGuess" name="episodeGuess" placeholder="Episode number" required autocomplete="off" autocorrect="off" spellcheck="false">
            <button type="submit">Submit</button>
        </form>
    </div>
    <p id="resultMessage"></p>
    <div class="counter">
